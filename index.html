<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="containner">
        <div class="header">
            <input type="text" placeholder="Enter the City">
            <button class="search"><img src="search.png" alt=""></button>
        </div>
        
        <div class="weather hide">
            <img class="weather-icon" src="rain.png" alt="">
            <h1 class="temp">31°C</h1>
            <h2 class="city">Bairiya</h2>
        </div>
        <div class="bottom">
            <div class="leftcol">
                <img class="humiditying" src="humidity.png" alt="">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
         
         <div class="rightcol">
                <img class="winding" src="wind.png" alt="">
                <div>
                    <p class="wind">10 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>

        </div>

    </div>
  <script src="script.js"></script> 
</body>
</html>
